name: clean-bypass-list.yml

on:
  schedule:
    - cron: '0 2 * * *'   # daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download original list
        run: |
          curl -L -o source.txt https://raw.githubusercontent.com/hagezi/dns-blocklists/main/wildcard/doh-vpn-proxy-bypass.txt

      - name: Clean and filter list
        run: |
          # Remove tailscale, comments, empty lines
          grep -vi 'tailscale.com' source.txt | \
          grep -v '^#' | \
          grep -v '^$' | \
          sort -u > cleaned.txt

      - name: Move to output folder
        run: |
          mkdir -p output
          mv cleaned.txt output/bypass-cleaned.txt

      - name: Commit only if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if git diff --quiet; then
            echo "No changes"
          else
            git add bypass-cleaned.txt
            git commit -m "Update cleaned list"
            git push
          fi
